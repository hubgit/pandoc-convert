<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pandoc-convert iframe service</title>
  </head>
  <body>
    <script type="module">
      const CHANNEL = 'pandoc-convert';
      const params = new URLSearchParams(window.location.search);
      const allowedOrigins = (params.get('allow') || '')
        .split(',')
        .map((o) => o.trim())
        .filter(Boolean);

      const requestedVersion = params.get('version') || '1.0.3';
      const moduleUrl =
        params.get('module') ||
        `https://cdn.jsdelivr.net/npm/pandoc-wasm@${requestedVersion}/+esm`;

      let adapter;
      let initError;

      function isOriginAllowed(origin) {
        if (allowedOrigins.length === 0) return true;
        return allowedOrigins.includes(origin);
      }

      function toUint8Array(value) {
        if (value instanceof Uint8Array) return value;
        if (value instanceof ArrayBuffer) return new Uint8Array(value);
        if (ArrayBuffer.isView(value)) {
          return new Uint8Array(value.buffer, value.byteOffset, value.byteLength);
        }
        throw new Error('File payload data must be an ArrayBuffer or typed array.');
      }

      function normalizePayload(payload = {}) {
        const files = Array.isArray(payload.files)
          ? payload.files.map((file, index) => {
              if (!file || typeof file.path !== 'string' || file.path.length === 0) {
                throw new Error(`files[${index}] must include a non-empty string path.`);
              }

              return {
                path: file.path,
                data: toUint8Array(file.data),
              };
            })
          : [];

        return {
          source: payload.source ?? '',
          from: payload.from,
          to: payload.to,
          args: payload.args || [],
          files,
        };
      }

      function reply(targetWindow, targetOrigin, type, id, payload) {
        if (!targetWindow || typeof targetWindow.postMessage !== 'function') return;

        targetWindow.postMessage(
          {
            channel: CHANNEL,
            type,
            id,
            payload,
          },
          targetOrigin,
        );
      }

      async function importPandocModule() {
        try {
          return await import(moduleUrl);
        } catch (initialError) {
          const fallbackUrl = `${moduleUrl}${moduleUrl.includes('?') ? '&' : '?'}module`; // compatibility fallback
          try {
            return await import(fallbackUrl);
          } catch {
            throw initialError;
          }
        }
      }

      async function initPandoc() {
        const mod = await importPandocModule();
        const candidate =
          mod?.createPandoc ?? mod?.createConverter ?? mod?.Pandoc ?? mod?.default ?? mod;

        if (typeof candidate === 'function') {
          const instance = await candidate();

          if (typeof instance === 'function') {
            return {
              convert: (payload) => instance(normalizePayload(payload)),
            };
          }

          if (typeof instance?.convert === 'function') {
            return {
              convert: (payload) => {
                const normalized = normalizePayload(payload);
                return instance.convert(normalized.source, {
                  from: normalized.from,
                  to: normalized.to,
                  args: normalized.args,
                  files: normalized.files,
                });
              },
            };
          }
        }

        if (typeof candidate?.convert === 'function') {
          return {
            convert: (payload) => {
              const normalized = normalizePayload(payload);
              return candidate.convert(normalized.source, {
                from: normalized.from,
                to: normalized.to,
                args: normalized.args,
                files: normalized.files,
              });
            },
          };
        }

        throw new Error(
          'Unable to resolve a pandoc-wasm adapter. Pass ?version=... for jsDelivr or ?module=... for a compatible ESM build.',
        );
      }

      try {
        adapter = await initPandoc();
      } catch (err) {
        initError = err;
      }

      window.addEventListener('message', async (event) => {
        const message = event.data;

        if (!message || message.channel !== CHANNEL || message.type !== 'pandoc:convert') {
          return;
        }

        if (!isOriginAllowed(event.origin)) {
          reply(event.source, event.origin, 'pandoc:error', message.id, {
            message: `Origin not allowed: ${event.origin}`,
          });
          return;
        }

        if (initError) {
          reply(event.source, event.origin, 'pandoc:error', message.id, {
            message: initError.message,
            stack: initError.stack,
          });
          return;
        }

        try {
          const output = await adapter.convert(message.payload || {});
          reply(event.source, event.origin, 'pandoc:result', message.id, { output });
        } catch (err) {
          reply(event.source, event.origin, 'pandoc:error', message.id, {
            message: err.message,
            stack: err.stack,
          });
        }
      });

      window.parent?.postMessage(
        {
          channel: CHANNEL,
          type: 'pandoc:ready',
          payload: {
            requestedVersion,
            moduleUrl,
            allowedOrigins,
            initialized: !initError,
            error: initError?.message,
          },
        },
        '*',
      );
    </script>
  </body>
</html>
