<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pandoc-convert demo</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 2rem auto;
        max-width: 900px;
        padding: 0 1rem;
      }
      textarea {
        width: 100%;
        min-height: 180px;
      }
      pre {
        white-space: pre-wrap;
        background: #111;
        color: #f3f3f3;
        padding: 1rem;
        border-radius: 8px;
      }
      .row {
        display: flex;
        gap: 1rem;
      }
      .row > * {
        flex: 1;
      }
      button {
        margin-top: 0.75rem;
        padding: 0.5rem 0.9rem;
      }
      .status {
        color: #555;
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <h1>pandoc-convert demo</h1>
    <p class="status" id="status">Waiting for iframe…</p>

    <div class="row">
      <div>
        <label for="source">Markdown input</label>
        <textarea id="source"># Hello from pandoc-convert\n\n- Works over postMessage\n- Runs in iframe</textarea>
      </div>
      <div>
        <label for="output">Result</label>
        <pre id="output">(no output yet)</pre>
      </div>
    </div>

    <button id="convert">Convert Markdown -> HTML</button>

    <iframe id="pandoc" src="./iframe.html?version=1.0.3" hidden></iframe>

    <script>
      const channel = 'pandoc-convert';
      const iframe = document.getElementById('pandoc');
      const statusEl = document.getElementById('status');
      const sourceEl = document.getElementById('source');
      const outputEl = document.getElementById('output');
      const buttonEl = document.getElementById('convert');
      const pending = new Map();

      window.addEventListener('message', (event) => {
        const msg = event.data;
        if (!msg || msg.channel !== channel) return;

        if (msg.type === 'pandoc:ready') {
          statusEl.textContent = msg.payload.initialized
            ? `Service is ready (version ${msg.payload.requestedVersion}).`
            : `Service failed to initialize for version ${msg.payload.requestedVersion}: ${msg.payload.error}`;
          return;
        }

        const resolver = pending.get(msg.id);
        if (!resolver) return;
        pending.delete(msg.id);

        if (msg.type === 'pandoc:result') {
          resolver.resolve(msg.payload.output);
        } else {
          resolver.reject(new Error(msg.payload?.message || 'Unknown error'));
        }
      });

      function requestConversion(payload, transfer = []) {
        const id = crypto.randomUUID();

        return new Promise((resolve, reject) => {
          pending.set(id, { resolve, reject });
          iframe.contentWindow.postMessage(
            {
              channel,
              type: 'pandoc:convert',
              id,
              payload,
            },
            window.location.origin,
            transfer,
          );
        });
      }

      buttonEl.addEventListener('click', async () => {
        outputEl.textContent = 'Converting...';

        const includeFileText = 'This is an extra file sent as an ArrayBuffer.';
        const includeFileBuffer = new TextEncoder().encode(includeFileText).buffer;

        try {
          const output = await requestConversion(
            {
              source: sourceEl.value,
              from: 'markdown',
              to: 'html',
              files: [
                {
                  path: 'include.txt',
                  data: includeFileBuffer,
                },
              ],
            },
            [includeFileBuffer],
          );
          outputEl.textContent = output;
        } catch (error) {
          outputEl.textContent = `Error: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
