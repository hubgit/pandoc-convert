<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pandoc-convert demo</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 2rem auto;
        max-width: 900px;
        padding: 0 1rem;
      }
      textarea {
        width: 100%;
        min-height: 180px;
      }
      pre {
        white-space: pre-wrap;
        background: #111;
        color: #f3f3f3;
        padding: 1rem;
        border-radius: 8px;
      }
      .row {
        display: flex;
        gap: 1rem;
      }
      .row > * {
        flex: 1;
      }
      button {
        margin-top: 0.75rem;
        padding: 0.5rem 0.9rem;
      }
      .status {
        color: #555;
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <h1>pandoc-convert demo</h1>
    <p class="status" id="status">Waiting for iframe…</p>

    <div class="row">
      <div>
        <label for="source">Markdown input</label>
        <textarea id="source"># Hello from pandoc-convert\n\n- Works over postMessage\n- Runs in iframe</textarea>
      </div>
      <div>
        <label for="output">Result</label>
        <pre id="output">(no output yet)</pre>
      </div>
    </div>

    <button id="convert">Convert Markdown -> HTML</button>

    <iframe id="pandoc" src="/iframe.html" hidden></iframe>

    <script type="module" src="/src/demo.js"></script>
  </body>
</html>
